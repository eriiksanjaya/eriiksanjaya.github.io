<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR Code</title>
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon/index.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://eriiksanjaya.github.io/assets/html5-qrcode.min.js"></script>

    <style>
        /* Override default html5-qrcode styles for a modern look */
        #reader {
            border: none !important;
            border-radius: 1.5rem;
            overflow: hidden;
            background-color: white;
            box-shadow: 20px 20px 25px 5px rgba(77, 82, 221, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        #reader__dashboard_section_csr span {
            display: block;
            margin-bottom: 0.5rem;
            color: #4b5563;
            font-weight: 500;
        }

        #reader__dashboard_section_csr button {
            background-color: #6366f1 !important;
            /* Indigo-500 */
            color: white !important;
            border: none !important;
            padding: 0.75rem 1.5rem !important;
            border-radius: 5rem !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4) !important;
            margin: 0.25rem;
        }

        #reader__dashboard_section_csr button:hover {
            background-color: #4f46e5 !important;
            /* Indigo-600 */
            transform: translateY(-1px);
        }

        #reader__dashboard_section_swaplink {
            text-decoration: none !important;
            color: #64748b !important;
            font-weight: 500 !important;
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #f1f5f9;
            border-radius: 999px;
            font-size: 0.875rem;
        }

        #reader__dashboard_section_swaplink:hover {
            background-color: #e2e8f0;
        }

        #reader__scan_region {
            background-color: #f8fafc;
        }

        /* Customize video frame */
        #reader video {
            border-radius: 1.5rem !important;
            object-fit: cover !important;
        }
    </style>
</head>

<body
    class="bg-slate-50 min-h-screen flex flex-col font-sans antialiased text-slate-800 selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Top Navigation -->
    <div class="w-full bg-white shadow-sm p-4 flex items-center justify-between sticky top-0 z-50">
        <a href="login.html" class="p-2 rounded-full hover:bg-slate-100 transition-colors bg-slate-50 text-slate-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
            </svg>
        </a>
        <h1 class="text-lg font-bold tracking-tight text-slate-800">Scan QR Code</h1>
        <div class="w-10"></div> <!-- Spacer for centering -->
    </div>

    <!-- Main Content -->
    <div class="flex-1 w-full max-w-lg mx-auto p-6 flex flex-col items-center justify-center space-y-6">

        <!-- Scanner Container -->
        <div class="relative w-full">
            <div id="reader" class="w-full"></div>
        </div>

        <!-- Success Result Container -->
        <div id="result-container" style="display: none;"
            class="w-full bg-white p-6 rounded-3xl shadow-lg border border-slate-100 flex flex-col items-center transform transition-all">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-1">Berhasil Discan!</h3>
            <p class="text-sm text-slate-500 text-center mb-6">Memproses data QR Code...</p>

            <div
                class="w-full bg-slate-50 p-4 rounded-xl border border-dashed border-slate-200 mb-6 flex justify-center break-all text-xs font-mono text-slate-500">
                <span id="result-text"></span>
            </div>

            <button id="btn-login"
                class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white font-bold py-4 px-6 rounded-2xl transition duration-200 shadow-md shadow-indigo-200">
                Lanjutkan Login
            </button>
        </div>

        <!-- Footer / Branding -->
        <div class="mt-8 w-full flex justify-center">
            <a href="https://eriksanjaya.com" target="_blank" rel="noopener noreferrer"
                class="group flex items-center space-x-2 px-4 py-1.5 rounded-full bg-slate-200/50 hover:bg-white border border-transparent hover:border-indigo-100 hover:shadow-sm hover:shadow-indigo-100 transition-all duration-300">
                <div class="flex items-center justify-center text-indigo-500 group-hover:text-indigo-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                    </svg>
                </div>
                <span
                    class="text-xs font-bold text-slate-500 group-hover:text-indigo-600 transition-colors">eriksanjaya.com</span>
            </a>
        </div>

    </div>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var html5QrcodeScanner = null;
            var scannedValue = "";

            function initializeScanner() {
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader",
                    {
                        fps: 10,
                        qrbox: { width: 270, height: 270 },
                        aspectRatio: 1.0,
                        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
                    },
                    /* verbose= */ false
                );

                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            }

            function onScanSuccess(decodedText, decodedResult) {
                console.log(`Scan result: \${decodedText}`, decodedResult);
                scannedValue = decodedText;

                // Stop scanning and hide reader
                html5QrcodeScanner.clear().then(() => {
                    document.getElementById('reader').style.display = 'none';

                    // Show success container
                    var resultContainer = document.getElementById('result-container');
                    resultContainer.style.display = 'flex';

                    document.getElementById('result-text').innerText = decodedText;

                    // Automatically attempt to route if it's a URL
                    handleScannedValue(decodedText, false);
                }).catch(error => {
                    console.error("Failed to clear html5QrcodeScanner. ", error);
                });
            }

            function onScanFailure(error) {
                // handle scan failure, usually better to ignore and keep scanning.
                // console.warn(`Code scan error = \${error}`);
            }

            function handleScannedValue(value, manualClick) {
                // Jika isinya dimulai dengan HTTP/HTTPS (seperti URL Login Mikrotik yg di-generate)
                if (value.startsWith('http://') || value.startsWith('https://')) {
                    if (manualClick) {
                        window.location.href = value;
                    } else {
                        // Otomatis direct setelah 1.5 detik
                        var btn = document.getElementById('btn-login');
                        btn.innerText = "Mengalihkan...";
                        setTimeout(function () {
                            window.location.href = value;
                        }, 15000);
                    }
                } else {
                    // Jika berisi text biasa (seperti voucher code) bisa dilempar ke login param
                    if (manualClick) {
                        window.location.href = 'login.html?username=' + encodeURIComponent(value) + '&password=' + encodeURIComponent(value);
                    }
                }
            }

            // Handle manual login button click
            document.getElementById('btn-login').addEventListener('click', function () {
                if (scannedValue) {
                    handleScannedValue(scannedValue, true);
                }
            });

            function fixReaderUI() {
                setInterval(function () {
                    // Remove ALL images in #reader
                    var imgs = document.querySelectorAll('#reader img');
                    imgs.forEach(function (img) {
                        img.remove();
                    });
                }, 1);
            }

            // Start
            initializeScanner();
            fixReaderUI();
        });
    </script>
</body>

</html>
